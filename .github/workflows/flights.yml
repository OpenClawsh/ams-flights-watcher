name: AMS Flights Check

on:
  schedule:
    - cron: "0 9 * * *"
  workflow_dispatch:

jobs:
  check-flights:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4

    - uses: actions/setup-python@v5
      with:
        python-version: "3.11"

    - name: Install dependencies
      run: |
        pip install --upgrade pip
        pip install fast-flights==3.0rc0 requests

    - name: Run flight scan
      run: python ams_flights_github.py scan --region europe --days 3

    - uses: actions/upload-artifact@v4
      with:
        name: flight-results
        path: results/
