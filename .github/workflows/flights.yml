name: AMS Flights Check

on:
  schedule:
    - cron: "0 9 * * *"
  workflow_dispatch:

jobs:
  check-flights:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    - uses: actions/setup-python@v5
      with:
        python-version: "3.11"
    - run: pip install fast-flights requests
    - run: python ams_flights_github.py scan europe --days 3
    - uses: actions/upload-artifact@v4
      with:
        name: flight-results
        path: results/
