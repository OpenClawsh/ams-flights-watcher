name: AMS General Flights
on:
  schedule:
    - cron: "0 8 * * *"
  workflow_dispatch:
jobs:
  check-flights:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    - uses: actions/setup-python@v5
      with:
        python-version: "3.11"
    - run: pip install --upgrade pip && pip install fast-flights==3.0rc0 requests
    - run: python ams_flights_general.py
    - uses: actions/upload-artifact@v4
      with:
        name: general-flights
        path: results/general_flights.json
